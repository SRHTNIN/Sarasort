Title = "SaraSortd Config"
Version = "6.1"
SafeMode = 1
SilentMode = 0
CheckInput = 5
DotFiles = 0
Logging = 1
OverwriteDirConf = 0

[Variables]
NextNum = "!"
NextChar = "&"
Parent = "@"
OrgFileName = "~"
OrgFileType = "^"
Year = "[y]"
Month = "[m]"
Day = "[d]"
Hour = "[h]"
Minute = "[n]"
Second = "[s]"
VarCall = "%%"

[DirectoryPaths]
RootDir = "C:/Users/StigOscarAadalen-Aas/OneDrive - Telemark fylkeskommune/Desktop/Testdir"
InputDir = [ "%RootDir%/Input" ]
OutputDir = [ "%RootDir%/Output" ]
LogDir = "%RootDir%/.Logs"
FailedDir = "%RootDir%/.Failed"

[Names]
LogFileName = "[y].[m].[d]"
InDirConfName = ".@Config"
OutDirConfName = ".@Config"
FileHistoryName = ".@History"

[Log]
All = "[h]:[n]:[s] | "
Start = "Started SaraSortd."
NotStart = "Error: Failed to start SaraSortd."
Stop = "Stopped SaraSortd.\n"
MatchPattern = "Checking %%."
Sorted = "Sorted %%."
NotSorted = "Error: Failed to sort %%. No valid output directory."
ValueSet = "Set %%."
Unset = "Error: %% is not set."
Zipping = "Zipping: %%."
Unzipping = "Unzipping: %%."
NoPermission = "Error: No permission to %%."
